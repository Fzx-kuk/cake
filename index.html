<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋糕选款系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif;}
        body{background:#f5f5f5;padding-bottom:70px;}
        .tab-bar{position:fixed;top:0;left:0;right:0;background:#fff;display:flex;overflow-x:auto;white-space:nowrap;box-shadow:0 1px 3px #ccc;z-index:99;}
        .tab{padding:12px 15px;font-size:15px;flex-shrink:0;}
        .tab.active{color:#ff5a3c;border-bottom:2px solid #ff5a3c;font-weight:bold;}
        .container{margin-top:55px;padding:10px;}
        .cake-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .cake-item{background:#fff;border-radius:8px;overflow:hidden;}
        .cake-item img{width:100%;height:auto;display:block;background:#fff;}
        .cake-no{text-align:center;padding:8px;font-size:16px;font-weight:bold;}
        .search-box{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;display:flex;gap:8px;box-shadow:0 -1px 3px #ccc;}
        .search-box input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:20px;outline:none;}
        .search-box button{padding:10px 20px;background:#ff5a3c;color:#fff;border:none;border-radius:20px;}
        .img-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:none;z-index:100;align-items:center;justify-content:center;}
        .img-modal img{max-width:90%;max-height:90vh;}
    </style>
</head>

let currentTag = 'all';
function renderList(){
    const list = document.getElementById('cakeList');
    list.innerHTML = '';
    let data = currentTag === 'all' ? cakeData : cakeData.filter(i=>i.tags.includes(currentTag));
    data.forEach(item=>{
        let div = document.createElement('div');
        div.className = 'cake-item';
        div.innerHTML = `<img src="${item.img}" onclick="openModal('${item.img}')"><div class="cake-no">${item.no}</div>`;
        list.appendChild(div);
    });
}
document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick = ()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        currentTag = tab.dataset.tag;
        renderList();
    }
});

// 修复搜索：大小写不敏感
function searchCake(){
    let k = document.getElementById('searchInput').value.trim().toLowerCase();
    let f = cakeData.find(i=>i.no.toLowerCase() === k);
    if(f) openModal(f.img);
    else alert('未找到该编号');
}

function openModal(src){
    document.getElementById('modalImg').src = src;
    document.getElementById('imgModal').style.display='flex';
}
function closeModal(){
    document.getElementById('imgModal').style.display='none';
}
renderList();
